services:

  postgres-server:
    image: postgres:${POSTGRES_VERSION:-16}
    container_name: postgres-server
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    network_mode: host

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:ubuntu-7.0-latest
    container_name: zabbix-server
    environment:
      DB_SERVER_HOST: "${DB_SERVER_HOST:-127.0.0.1}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      ZBX_STARTPOLLERS: "${ZBX_STARTPOLLERS}"
      ZBX_STARTPINGERS: "${ZBX_STARTPINGERS}"
      ZBX_STARTUNREACHABLE: "${ZBX_STARTUNREACHABLE}"
      ZBX_STARTSNMPPOLLERS: "${ZBX_STARTSNMPPOLLERS}"
      ZBX_STARTTRAPPERS: "${ZBX_STARTTRAPPERS}"
      ZBX_STARTDBSYNCERS: "${ZBX_STARTDBSYNCERS}"
      ZBX_TIMEOUT: "${ZBX_TIMEOUT}"
      ZBX_VALUECACHESIZE: "${ZBX_VALUECACHESIZE}"
      ZBX_HISTORYCACHESIZE: "${ZBX_HISTORYCACHESIZE}"
      ZBX_HISTORYINDEXCACHESIZE: "${ZBX_HISTORYINDEXCACHESIZE}"
      ZBX_CACHESIZE: "${ZBX_CACHESIZE}"
      ZBX_TRENDCACHESIZE: "${ZBX_TRENDCACHESIZE}"
      TZ: "${TZ}"
    depends_on:
      - postgres-server
    restart: unless-stopped
    network_mode: host

  zabbix-web:
    image: zabbix/zabbix-web-apache-pgsql:ubuntu-7.0-latest
    container_name: zabbix-web
    environment:
      ZBX_SERVER_HOST: "${ZBX_SERVER_HOST:-127.0.0.1}"
      DB_SERVER_HOST: "${DB_SERVER_HOST:-127.0.0.1}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      PHP_TZ: "${PHP_TZ}"
      TZ: "${TZ}"
    depends_on:
      - zabbix-server
    restart: unless-stopped
    network_mode: host

  zabbix-agent2:
    image: zabbix/zabbix-agent2:ubuntu-7.0-latest
    container_name: zabbix-agent2
    environment:
      ZBX_HOSTNAME: "Zabbix server"
      ZBX_SERVER_HOST: "${ZBX_SERVER_HOST:-127.0.0.1}"
    depends_on:
      - zabbix-server
    restart: always
    network_mode: host

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_INSTALL_PLUGINS=alexanderzobnin-zabbix-app
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    network_mode: host

volumes:
  postgres-data:
  grafana-data:
